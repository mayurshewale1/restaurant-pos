# Render Blueprint for Easy Deployment
# This file helps Render automatically configure your services

services:
  # Backend API Service
  - type: web
    name: restaurant-management-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_SYNC
        value: false
    # Database connection will be added when you create the PostgreSQL service

databases:
  # PostgreSQL Database
  - name: restaurant-management-db
    databaseName: restaurant_management
    user: restaurant_user
    plan: free
